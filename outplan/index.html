<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Propostas — Outplan · Agência O2</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="../assets/logo-o2.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0F0B1C; --ink: #F4F2F8; --ink-soft: #C9C3DB; --ink-mute: #8A839E;
    --accent: #E89A82; --line: rgba(255,255,255,0.1); --card: rgba(255,255,255,0.03);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  .bg { position: fixed; inset: 0; z-index: 0; background:
    radial-gradient(ellipse 80% 60% at 100% 0%, rgba(232,154,130,0.20), transparent 65%),
    radial-gradient(ellipse 80% 70% at -5% 30%, rgba(28,38,92,0.45), transparent 65%),
    linear-gradient(135deg, #0a0820 0%, #15102e 30%, #1f1442 60%, #171034 100%); }
  .stage { position: relative; z-index: 3; min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 64px 24px; }
  .wrap { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 34px; }
  .head { display: flex; flex-direction: column; align-items: flex-start; gap: 20px; }
  .logo { width: 120px; height: auto; display: block; filter: drop-shadow(0 8px 30px rgba(0,0,0,0.35)); }
  .eyebrow { display: inline-flex; align-items: center; gap: 9px; padding: 7px 15px 7px 11px;
    border: 1px solid rgba(255,255,255,0.18); border-radius: 100px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); }
  .eyebrow::before { content: ''; width: 7px; height: 7px; background: var(--accent);
    border-radius: 50%; box-shadow: 0 0 10px rgba(232,154,130,0.7); }
  h1 { font-family: 'Inter Tight', 'Inter', sans-serif; font-weight: 600;
    font-size: clamp(34px, 5vw, 46px); line-height: 1.05; letter-spacing: -0.025em; }
  .list { display: flex; flex-direction: column; gap: 14px; }
  .card { display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 22px 24px; border: 1px solid var(--line); border-radius: 16px; background: var(--card);
    text-decoration: none; color: var(--ink); transition: transform .2s ease, background .3s ease, border-color .3s ease; }
  .card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.055);
    border-color: rgba(232,154,130,0.4); }
  .card-title { font-family: 'Inter Tight', 'Inter', sans-serif; font-weight: 600; font-size: 20px; letter-spacing: -0.01em; }
  .card-sub { font-size: 14px; line-height: 1.45; color: var(--ink-soft); margin-top: 5px; }
  .card-meta { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .card-date { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); white-space: nowrap; }
  .status { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;
    color: var(--accent); border: 1px solid rgba(232,154,130,0.35); border-radius: 100px; padding: 4px 9px; white-space: nowrap; }
  .arrow { color: var(--accent); font-size: 20px; transition: transform .2s ease; }
  .card:hover .arrow { transform: translateX(4px); }
  .foot { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
  @media (max-width: 560px) {
    .card { flex-direction: column; align-items: flex-start; gap: 14px; }
    .card-meta { align-self: flex-end; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<main class="stage">
  <div class="wrap">
    <div class="head">
      <img class="logo" src="../assets/logo-o2.png" alt="Agência O2" />
      <span class="eyebrow">Propostas comerciais</span>
      <h1>Outplan</h1>
    </div>
    <div class="list">
      <a class="card" href="identidade-site/">
        <div class="card-main">
          <div class="card-title">Identidade Visual + Site Institucional</div>
          <div class="card-sub">Nova identidade de marca e site institucional da Outplan</div>
        </div>
        <div class="card-meta">
          <span class="status">Enviada</span>
          <span class="card-date">Jul · 2026</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
      <a class="card" href="motion-outbuycenter/">
        <div class="card-main">
          <div class="card-title">Motion Graphics · OutBuyCenter</div>
          <div class="card-sub">Vídeo animado de 60s para anúncios e eventos</div>
        </div>
        <div class="card-meta">
          <span class="status">Enviada</span>
          <span class="card-date">Jun · 2026</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
    </div>
    <div class="foot">Agência O2 · 2026</div>
  </div>
</main>
</body>
</html>
